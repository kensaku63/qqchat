    function buildInitialSetupPrompt() {
      var loopEntries = Object.entries(state.orchestration.loopAgents);
      var triggerEntries = Object.entries(state.orchestration.triggerAgents);
      if (loopEntries.length === 0 && triggerEntries.length === 0) return '';

      var allAgents = {};
      loopEntries.forEach(function(e) { allAgents[e[0]] = { type: 'loop', cfg: e[1] }; });
      triggerEntries.forEach(function(e) {
        if (allAgents[e[0]]) { allAgents[e[0]].triggerCfg = e[1]; }
        else { allAgents[e[0]] = { type: 'trigger', cfg: e[1] }; }
      });

      var lines = [];
      lines.push('以下のQQchatエージェント環境をセットアップしてください。');
      lines.push('');

      var step = 1;

      lines.push('## ' + step + '. tmux セッション起動');
      step++;
      lines.push('');
      lines.push('tmux new-session -d -s agents -n watch');
      var agentNames = Object.keys(allAgents);
      agentNames.forEach(function(name) {
        lines.push('tmux new-window -t agents -n ' + name);
      });
      lines.push('');

      lines.push('## ' + step + '. 各ターミナルで AI を起動');
      step++;
      lines.push('');
      agentNames.forEach(function(name) {
        var entry = allAgents[name];
        var dir = entry.cfg.directory || '';
        if (!dir && entry.triggerCfg && entry.triggerCfg.directory) dir = entry.triggerCfg.directory;

        var ai = 'claude';
        if (entry.type === 'trigger') ai = entry.cfg.ai || 'claude';
        if (entry.triggerCfg) ai = entry.triggerCfg.ai || ai;

        var cdCmd = dir ? 'cd ' + dir + ' && ' : '';
        lines.push("tmux send-keys -t agents:" + name + " '" + cdCmd + ai + "' Enter");
      });
      lines.push('');
      lines.push('AI の起動を 10〜15 秒待ってから、次のステップに進んでください。');
      lines.push('');

      if (loopEntries.length > 0) {
        lines.push('## ' + step + '. Loop エージェントに /loop を送信');
        step++;
        lines.push('');
        lines.push('S=~/.claude/skills/tmux/send.sh');
        loopEntries.forEach(function(entry) {
          var name = entry[0], cfg = entry[1];
          var info = state.agents[name];
          var prompt = info && info.prompt ? info.prompt : '';
          var loopMsg = '/loop ' + (cfg.interval || '5m') + ' あなたはQQchatのエージェント「' + name + '」です。' + (prompt ? prompt + ' ' : '') + 'chat unread --for ' + name + ' で未読を確認し、未読があれば内容を読んで適切に返信してください。返信は chat send <channel> \'msg\' --agent-name ' + name + ' で送ってください。';
          lines.push('bash $S --target agents:' + name + ' "' + shellEscapeDQ(loopMsg) + '"');
        });
        lines.push('');
      }

      if (triggerEntries.length > 0) {
        lines.push('## ' + step + '. 初期プロンプト送信 (Trigger エージェント)');
        step++;
        lines.push('');
        if (loopEntries.length === 0) lines.push('S=~/.claude/skills/tmux/send.sh');
        triggerEntries.forEach(function(entry) {
          var name = entry[0], cfg = entry[1];
          var info = state.agents[name];
          var prompt = info && info.prompt ? info.prompt : '';
          var initMsg = 'あなたはQQchatのエージェント「' + name + '」です。' + (prompt ? prompt + ' ' : '') + 'メッセージが届いたら chat unread --for ' + name + ' で確認し、適切に返信してください。返信は chat send <channel> \'msg\' --agent-name ' + name + ' で送ってください。';
          lines.push('bash $S --target agents:' + name + ' "' + shellEscapeDQ(initMsg) + '"');
        });
        lines.push('');

        lines.push('## ' + step + '. triggers.json を作成');
        step++;
        lines.push('');
        lines.push('.chat/triggers.json を以下の内容で作成（または上書き）してください:');
        lines.push('');
        var triggers = triggerEntries.map(function(entry) {
          var name = entry[0], cfg = entry[1];
          var tmuxMsg = 'QQchatで' + (cfg.pattern || '@' + name) + 'へのメンションがありました。chat unread --for ' + name + ' で未読を確認して返信してください。';
          return {
            name: name.toLowerCase() + '-mention',
            pattern: cfg.pattern || '@' + name,
            command: "bash ~/.claude/skills/tmux/send.sh --target agents:" + name + " '" + tmuxMsg.replace(/'/g, "'\\''") + "'",
            cooldown: cfg.cooldown || 30,
          };
        });
        lines.push(JSON.stringify(triggers, null, 2));
        lines.push('');
      }

      lines.push('## ' + step + '. メッセージ監視を開始');
      lines.push('');
      lines.push("tmux send-keys -t agents:watch 'chat watch' Enter");

      return lines.join('\n');
    }

    function buildPatrolPrompt() {
      var loopEntries = Object.entries(state.orchestration.loopAgents);
      var triggerEntries = Object.entries(state.orchestration.triggerAgents);
      if (loopEntries.length === 0 && triggerEntries.length === 0) return '';

      var allNames = [];
      loopEntries.forEach(function(e) { if (allNames.indexOf(e[0]) === -1) allNames.push(e[0]); });
      triggerEntries.forEach(function(e) { if (allNames.indexOf(e[0]) === -1) allNames.push(e[0]); });

      var interval = state.orchestration.patrolInterval || '10m';

      var lines = [];
      lines.push('/loop ' + interval + ' 以下のQQchatエージェントの定期巡回を行ってください。');
      lines.push('');
      lines.push('## 監視対象エージェント');
      allNames.forEach(function(name) {
        var info = state.agents[name];
        var role = info && info.role ? ' (' + info.role + ')' : '';
        lines.push('- ' + name + role);
      });
      lines.push('');
      lines.push('## 巡回手順');
      lines.push('');
      lines.push('1. 各エージェントの状態を確認:');
      lines.push('   - `chat unread --for <name>` で未読の溜まり具合をチェック');
      lines.push('   - 未読が多い（5件以上）場合、エージェントが停止している可能性あり');
      lines.push('');
      lines.push('2. 直近のメッセージ活動を確認:');
      lines.push('   - `chat read <channel> --last 10` で各エージェントの購読チャンネルの最新メッセージを確認');
      lines.push('   - エージェントが適切に応答しているか判断');
      lines.push('');
      lines.push('3. 改善が必要な場合:');
      lines.push('   - QQchat経由でエージェントにフィードバックを送信:');
      lines.push("     `chat send <channel> 'フィードバック内容' --agent-name <あなたの名前>`");
      lines.push('   - エージェントのメモリに学びを追加するよう指示');
      lines.push('   - 必要であればエージェントのプロンプトを `chat agent update` で更新');
      lines.push('');
      lines.push('4. アイドル状態のエージェントの処理:');
      lines.push('   - エージェントの仕事が一区切りついている場合、tmux経由で /compact を送信:');
      lines.push('     `bash ~/.claude/skills/tmux/send.sh --target agents:<name> "/compact"`');
      lines.push('');
      lines.push('5. tmuxセッションの生存確認:');
      lines.push('   - `tmux list-windows -t agents` で各ウィンドウが存在するか確認');
      lines.push('   - 消えているウィンドウがあれば再起動を検討');

      return lines.join('\n');
    }

    function buildPromptSection(title, promptText) {
      var section = el('div', { className: 'orch-prompt-section' });
      var header = el('div', { className: 'orch-prompt-header' }, ['\u25B6 ' + title]);
      var body = el('div', { className: 'orch-prompt-body' });
      body.style.display = 'none';

      header.addEventListener('click', function() {
        var collapsed = body.style.display === 'none';
        body.style.display = collapsed ? '' : 'none';
        header.textContent = (collapsed ? '\u25BC ' : '\u25B6 ') + title;
      });

      body.appendChild(el('div', { className: 'orch-code' }, [promptText]));

      var copyBtn = el('button', { className: 'orch-copy-btn' }, ['Copy']);
      copyBtn.addEventListener('click', function() {
        navigator.clipboard.writeText(promptText).then(function() {
          copyBtn.textContent = 'Copied!';
          copyBtn.classList.add('copied');
          setTimeout(function() { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 2000);
        });
      });
      var copyRow = el('div', { className: 'orch-copy-row' });
      copyRow.appendChild(copyBtn);
      body.appendChild(copyRow);

      section.appendChild(header);
      section.appendChild(body);
      return section;
    }

    function renderOrchPrompts() {
      var container = document.getElementById('orch-prompts');
      while (container.firstChild) container.removeChild(container.firstChild);

      var initPrompt = buildInitialSetupPrompt();
      var patrolPrompt = buildPatrolPrompt();

      if (!initPrompt && !patrolPrompt) return;

      container.appendChild(el('div', { className: 'section-label' }, ['Generated Prompts']));

      if (initPrompt) container.appendChild(buildPromptSection('Initial Setup', initPrompt));
      if (patrolPrompt) container.appendChild(buildPromptSection('Patrol Loop', patrolPrompt));
    }

    async function saveChannel() {
      let name = document.getElementById('ch-name-input').value.trim().toLowerCase().replace(/\s+/g, '-');
      if (!name) return;
      let desc = document.getElementById('ch-desc-input').value.trim();
      let status = document.getElementById('ch-status-input').value;
      let body = { name: name, description: desc };
      if (state.editingChannel) body.status = status;

      await fetch('/api/channels', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      document.getElementById('channel-panel-form').style.display = 'none';
      clearChannelForm();
      await fetchAndRenderChannelsPanel();
      await fetchChannels();
    }

    async function loadChannelSummaries(channelName) {
      let contentEl = document.querySelector('[data-summary-content="' + channelName + '"]');
      if (!contentEl) return;

      if (contentEl.style.display === '') {
        contentEl.style.display = 'none';
        let toggle = document.querySelector('[data-channel-summary="' + channelName + '"]');
        if (toggle) toggle.textContent = '\u25B6 Summaries';
        return;
      }

      contentEl.style.display = '';
      contentEl.innerHTML = '<div style="font-size:12px;color:#999;padding:4px 0;">Loading...</div>';
      let toggle = document.querySelector('[data-channel-summary="' + channelName + '"]');
      if (toggle) toggle.textContent = '\u25BC Summaries';

      let res = await fetch('/api/summaries/' + encodeURIComponent(channelName) + '?last=5');
      let data = await res.json();
      let summaries = data.summaries || [];

      while (contentEl.firstChild) contentEl.removeChild(contentEl.firstChild);
      if (summaries.length === 0) {
        contentEl.appendChild(el('div', { className: 'memory-empty' }, ['No summaries']));
        return;
      }
      summaries.reverse().forEach(function(s) {
        let date = new Date(s.created_at);
        let dateStr = String(date.getMonth()+1).padStart(2,'0') + '/' +
                     String(date.getDate()).padStart(2,'0') + ' ' +
                     String(date.getHours()).padStart(2,'0') + ':' +
                     String(date.getMinutes()).padStart(2,'0');
        contentEl.appendChild(el('div', { className: 'summary-item' }, [
          el('div', { className: 'summary-date' }, [dateStr]),
          el('div', { className: 'summary-text' }, [s.content]),
        ]));
      });
    }

    async function fetchAndRenderContext() {
      let content = document.getElementById('context-content');
      content.innerHTML = '<div class="panel-empty">Loading...</div>';
      try {
        let results = await Promise.all([
          fetch('/api/context').then(function(r) { return r.json(); }),
          fetch('/api/channels').then(function(r) { return r.json(); }),
          fetch('/api/agents').then(function(r) { return r.json(); }),
          fetch('/api/tasks').then(function(r) { return r.json(); }),
          fetch('/api/memories').then(function(r) { return r.json(); }),
          fetch('/api/summaries').then(function(r) { return r.json(); }),
        ]);
        while (content.firstChild) content.removeChild(content.firstChild);

        let contextData = {
          project: results[0].content || null,
          channels: results[1].channels || [],
          agents: results[2].agents || {},
          tasks: results[3].tasks || [],
          memories: results[4].memories || [],
          summaries: results[5].summaries || [],
        };

        if (contextData.project) {
          content.appendChild(el('div', { className: 'section-label' }, ['CHAT.md']));
          let pre = el('pre', { className: 'context-raw' });
          pre.textContent = contextData.project;

        content.appendChild(el('div', { className: 'section-label' }, ['Full Context (JSON)']));

      }

    document.getElementById('identity-change-btn').addEventListener('click', function() {
      let bar = document.getElementById('identity-bar');
      let label = document.getElementById('identity-label');
      let btn = document.getElementById('identity-change-btn');
      label.style.display = 'none';
      btn.style.display = 'none';

      let row = el('div', { className: 'identity-edit-row' });
      let input = el('input', { className: 'identity-edit-input', value: state.identity });
      let okBtn = el('button', { className: 'identity-edit-btn' }, ['\u2713']);
      let cancelBtn = el('button', { className: 'identity-edit-btn' }, ['\u00D7']);
      row.appendChild(input);
      row.appendChild(okBtn);
      row.appendChild(cancelBtn);
      bar.insertBefore(row, label);
      input.focus();
      input.select();

      function finish(save) {
        if (save) {
          let newName = input.value.trim() || state.identity;
          let oldName = state.identity;
          state.identity = newName;
          localStorage.setItem('qqchat-identity', newName);
          label.textContent = newName;
          registerMember(newName, oldName);
          fetchMembers();
        }
        row.remove();
        label.style.display = '';
        btn.style.display = '';
      }

      okBtn.addEventListener('click', function() { finish(true); });
      cancelBtn.addEventListener('click', function() { finish(false); });
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); finish(true); }
        if (e.key === 'Escape') finish(false);
      });
    });

      if (this.value === '_custom') {
        custom.style.display = '';
        custom.focus();
      } else {
        custom.style.display = 'none';
        custom.value = '';
      }
    });

    // --- Mobile sidebar ---

    document.getElementById('mobile-menu-btn').addEventListener('click', function() {
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('sidebar-overlay').classList.add('visible');
    });

    document.getElementById('sidebar-overlay').addEventListener('click', function() {
      document.getElementById('sidebar').classList.remove('open');
      this.classList.remove('visible');
    });

    function closeMobileSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-overlay').classList.remove('visible');
    }

    // --- Search ---

    function populateSearchAuthors() {
      let select = document.getElementById('search-author');
      let current = select.value;
      while (select.options.length > 1) select.remove(1);
      let authors = {};
      state.messages.forEach(function(m) {
        if (m.channel === state.currentChannel) {
          let name = getDisplayName(m.author);
          authors[name] = true;
        }
      });
      Object.keys(authors).sort().forEach(function(name) {
        let opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
      });
      select.value = current || '';
    }

    document.getElementById('search-btn').addEventListener('click', function() {
      let bar = document.getElementById('search-bar');
      if (bar.classList.contains('visible')) {
        closeSearch();
      } else {
        populateSearchAuthors();
        bar.classList.add('visible');
        document.getElementById('search-input').focus();
      }
    });

    document.getElementById('search-close-btn').addEventListener('click', closeSearch);

    function closeSearch() {
      document.getElementById('search-bar').classList.remove('visible');
      document.getElementById('search-input').value = '';
      document.getElementById('search-author').value = '';
      document.getElementById('search-count').textContent = '';
      clearSearchFilter();
    }

    function clearSearchFilter() {
      document.querySelectorAll('.message.search-hidden').forEach(function(m) {
        m.classList.remove('search-hidden');
      });
    }

    function applySearchFilter() {
      let query = document.getElementById('search-input').value.trim().toLowerCase();
      let authorFilter = document.getElementById('search-author').value;
      if (!query && !authorFilter) {
        clearSearchFilter();
        document.getElementById('search-count').textContent = '';
        return;
      }
      let messages = document.getElementById('messages').querySelectorAll('.message');
      let matchCount = 0;
      messages.forEach(function(m) {
        let matchText = !query || m.textContent.toLowerCase().includes(query);
        let matchAuthor = true;
        if (authorFilter) {
          let msgId = m.getAttribute('data-id');
          let msg = findMessage(msgId);
          matchAuthor = msg && getDisplayName(msg.author) === authorFilter;
        }
        if (matchText && matchAuthor) {
          m.classList.remove('search-hidden');
          matchCount++;
        } else {
          m.classList.add('search-hidden');
        }
      });
      document.getElementById('search-count').textContent = matchCount + ' found';
    }

    document.getElementById('search-input').addEventListener('input', applySearchFilter);
    document.getElementById('search-author').addEventListener('change', applySearchFilter);

    document.getElementById('search-input').addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeSearch();
    });

    // --- Init ---

    function showWelcomeOverlay() {
      let overlay = el('div', { id: 'welcome-overlay' });
      let box = el('div', { id: 'welcome-box' }, [
        el('h2', {}, ['Welcome to ' + state.chatName]),
        el('p', {}, ['Enter your display name to join']),
        el('input', { id: 'welcome-name-input', placeholder: 'Your name' }),
        el('button', { id: 'welcome-join-btn' }, ['Join']),
      ]);
      overlay.appendChild(box);
      document.body.appendChild(overlay);

      let input = document.getElementById('welcome-name-input');
      input.focus();

      async function joinWithName() {
        let name = input.value.trim();
        if (!name) { input.focus(); return; }
        state.identity = name;
        state.needsWelcome = false;
        localStorage.setItem('qqchat-identity', name);
        document.getElementById('identity-label').textContent = name;
        overlay.remove();
        await registerMember(name);
        await fetchMembers();
      }

      document.getElementById('welcome-join-btn').addEventListener('click', joinWithName);
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); joinWithName(); }
      });
    }

    async function init() {
      await fetchInfo();
      if (state.publicRead) {
        document.querySelectorAll('.panel-add-btn').forEach(function(btn) { btn.style.display = 'none'; });
      } else if (state.needsWelcome) {
        // Show welcome overlay, defer member registration
      } else {
        await registerMember(state.identity);
      }
      await fetchMembers();
      await fetchAgents();
      await fetchChannels();
      await fetchMessages();
      updateChannelHeaderDesc();
      connectWS();
      if (state.needsWelcome) showWelcomeOverlay();
    }

    init();

    // Save last read on page unload
    window.addEventListener('beforeunload', function() { saveLastRead(); });

    // Update relative timestamps every minute
    setInterval(function() {
      document.querySelectorAll('.msg-time[data-msg-id]').forEach(function(span) {
        let id = span.getAttribute('data-msg-id');
        let rel = formatRelativeTime(id);
        span.textContent = rel || formatTime(id);
      });
    }, 60000);
  </script>
</body>
</html>
